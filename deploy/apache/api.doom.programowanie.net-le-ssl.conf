<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName api.doom.programowanie.net

    ServerAdmin webmaster@programowanie.net
    DocumentRoot /home/services/programowanie.net/api.doom.programowanie.net/www/public

    ErrorLog /home/services/programowanie.net/api.doom.programowanie.net/logs/error.log
    CustomLog /home/services/programowanie.net/api.doom.programowanie.net/logs/access.log combined

    <Directory /home/services/programowanie.net/api.doom.programowanie.net/www/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

SSLCertificateFile /etc/letsencrypt/live/api.doom.programowanie.net/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/api.doom.programowanie.net/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
