<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName doom.programowanie.net

    ServerAdmin webmaster@programowanie.net
    DocumentRoot /home/services/programowanie.net/doom.programowanie.net/www/dist

    ErrorLog /home/services/programowanie.net/doom.programowanie.net/logs/error.log
    CustomLog /home/services/programowanie.net/doom.programowanie.net/logs/access.log combined

    AddType application/wasm .wasm
    AliasMatch ^/api(?:/.*)?$ /home/services/programowanie.net/api.doom.programowanie.net/www/public/index.php

    <Directory /home/services/programowanie.net/api.doom.programowanie.net/www/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /home/services/programowanie.net/doom.programowanie.net/www/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [END]
        RewriteRule ^wads/ - [R=404,END]
        RewriteRule ^ /index.html [END]
    </Directory>

    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

SSLCertificateFile /etc/letsencrypt/live/doom.programowanie.net/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/doom.programowanie.net/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
